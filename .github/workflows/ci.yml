name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore tools
        run: dotnet tool restore

      - name: Build
        run: dotnet build --no-incremental -warnaserror

      - name: Format check
        run: dotnet fantomas --check src/ tests/

      - name: Test
        run: dotnet test --no-build
