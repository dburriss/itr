[metadata]
name = "itr-backlog"
description = "Browse backlog items and take them"
# requirements = ["itr"]

[source]
# Fields: id\ttype\tpriority\tstatus\tview\ttaskCount\tcreatedAt\ttitle\tpath
command = [
    "mise run backlog list --status created --output text",
    "mise run backlog list --status planning --output text",
    "mise run backlog list --status planned --output text",
]
display = "{split:\t:0|pad:30} {split:\t:3|pad:12} {split:\t:2}"
output = "{split:\t:0}"
no_sort = true

[preview]
command = "mise run backlog info '{split:\t:0}'"

[ui]
layout = "landscape"
input_header = "Backlog Items"

[ui.preview_panel]
size = 66
header = "{split:\t:0} backlog item"

[keybindings]
shortcut = "f7"
enter = "actions:drill-tasks"
ctrl-t = "actions:take"
ctrl-a = "actions:add"
ctrl-d = "actions:drill-tasks"
ctrl-e = "actions:edit"

[actions.take]
description = "Take backlog item (create tasks)"
command = "mise run backlog take '{split:\t:0}'"
mode = "fork"

[actions.add]
description = "Add new backlog item (interactive)"
command = "zellij action new-pane --floating --close-on-exit -- mise run backlog add -i"
mode = "fork"

[actions.drill-tasks]
description = "Drill into tasks for this backlog item"
command = "tv itr-tasks --source-command \"mise run task list --backlog-id '{split:\t:0}' --output text\""
mode = "execute"

[actions.edit]
description = "Open item.yaml in $EDITOR"
command = "$EDITOR '{split:\t:8}'"
mode = "fork"
