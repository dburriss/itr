[tools]
dotnet = "latest"
"npm:@fission-ai/openspec" = "latest"
television = "latest"

[env]
TELEVISION_CONFIG = "./.tv/"
# Switch to the built binary for faster execution:
ITR_BIN = "src/cli/bin/Debug/net10.0/Itr.Cli"
# ITR_BIN = "dotnet run --no-build --project src/cli/Itr.Cli.fsproj --"

# Define tasks for building, testing, formatting, and running the project.
[tasks.build]
run = "dotnet build"
description = "Build the project using dotnet build."

[tasks.test]
run = "dotnet test --no-build"
depends = ["format-check"]
description = "Run tests using dotnet test."

[tasks.format]
run = "dotnet fantomas src/ tests/"
description = "Format all F# source files in-place using Fantomas."

[tasks.format-check]
run = "dotnet fantomas --check src/ tests/"
depends = ["build"]
description = "Check F# formatting without modifying files (used in CI)."

[tasks.verify]
depends = ["test"]
description = "Full pre-push verification: build, format check, test."

# Define tasks for running specific CLI commands.
# Toggle ITR_BIN above to switch between dotnet run and the built binary.
[tasks.itr]
run = "$ITR_BIN"
description = "Run the Itr CLI."

[tasks.itr-help]
run = "$ITR_BIN --help"
description = "Show help for the Itr CLI."

[tasks.profile]
run = "$ITR_BIN profile"
description = "Run the profile command."

[tasks.product]
run = "$ITR_BIN product"
description = "Run the product command."

[tasks.backlog]
run = "$ITR_BIN backlog"
description = "Run the backlog command."

[tasks.view]
run = "$ITR_BIN view"
description = "Run the view command."

[tasks.task]
run = "$ITR_BIN task"
description = "Run the task command."
