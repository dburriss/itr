[tools]
dotnet = "latest"
"npm:@fission-ai/openspec" = "latest"
television = "latest"

[env]
TELEVISION_CONFIG = "./.tv/"

# Define tasks for building, testing, formatting, and running the project.
[tasks.build]
run = "dotnet build"
description = "Build the project using dotnet build."

[tasks.test]
run = "dotnet test --no-build"
depends = ["format-check"]
description = "Run tests using dotnet test."

[tasks.format]
run = "dotnet fantomas src/ tests/"
description = "Format all F# source files in-place using Fantomas."

[tasks.format-check]
run = "dotnet fantomas --check src/ tests/"
depends = ["build"]
description = "Check F# formatting without modifying files (used in CI)."

[tasks.verify]
depends = ["test"]
description = "Full pre-push verification: build, format check, test."

# Define tasks for running specific CLI commands using dotnet run.
[tasks.itr]
run = "dotnet run --project src/cli/Itr.Cli.fsproj --"
description = "Run the Itr CLI using dotnet run."

[tasks.itr-help]
run = "dotnet run --project src/cli/Itr.Cli.fsproj -- --help"
description = "Show help for the Itr CLI."

[tasks.profile]
run = "dotnet run --project src/cli/Itr.Cli.fsproj -- profile"
description = "Run the profile command using dotnet run."

[tasks.profile-add]
run = "dotnet run --project src/cli/Itr.Cli.fsproj -- profile add"
description = "Run the profile add command using dotnet run."

[tasks.profile-list]
run = "dotnet run --project src/cli/Itr.Cli.fsproj -- profile list"
description = "Run the profile list command using dotnet run."

[tasks.profile-select]
run = "dotnet run --project src/cli/Itr.Cli.fsproj -- profile select"
description = "Run the profile select command using dotnet run."

[tasks.product-init]
run = "dotnet run --project src/cli/Itr.Cli.fsproj -- product init"
description = "Run the product init command using dotnet run."

[tasks.product-register]
run = "dotnet run --project src/cli/Itr.Cli.fsproj -- product register ./itr/"
description = "Run the product register command using dotnet run."

[tasks.backlog-add]
run = "dotnet run --project src/cli/Itr.Cli.fsproj -- backlog add -i"
description = "Interactively add a new backlog item."

[tasks.backlog-take]
run = "dotnet run --project src/cli/Itr.Cli.fsproj -- backlog take"
description = "Run the backlog take command using dotnet run."

[tasks.backlog-list]
run = "dotnet run --project src/cli/Itr.Cli.fsproj -- backlog list"
description = "Run the backlog list command using dotnet run."

[tasks.backlog-info]
run = "dotnet run --project src/cli/Itr.Cli.fsproj -- backlog info"
description = "Run the backlog info command using dotnet run."

[tasks.task-list]
run = "dotnet run --project src/cli/Itr.Cli.fsproj -- task list"
description = "Run the task list command using dotnet run."

[tasks.task-info]
run = "dotnet run --project src/cli/Itr.Cli.fsproj -- task info"
description = "Run the task info command using dotnet run."

[tasks.task-plan]
run = "dotnet run --project src/cli/Itr.Cli.fsproj -- task plan"
description = "Run the task plan command using dotnet run."

[tasks.task-approve]
run = "dotnet run --project src/cli/Itr.Cli.fsproj -- task approve"
description = "Run the task approve command using dotnet run."
