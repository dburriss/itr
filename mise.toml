[tools]
dotnet = "latest"
"npm:@fission-ai/openspec" = "latest"
television = "latest"

[env]
TELEVISION_CONFIG = "./.tv/"

# Define tasks for building, testing, formatting, and running the project.
[tasks.build]
run = "dotnet build"
description = "Build the project using dotnet build."

[tasks.test]
run = "dotnet test --no-build"
depends = ["format-check"]
description = "Run tests using dotnet test."

[tasks.format]
run = "dotnet fantomas src/ tests/"
description = "Format all F# source files in-place using Fantomas."

[tasks.format-check]
run = "dotnet fantomas --check src/ tests/"
depends = ["build"]
description = "Check F# formatting without modifying files (used in CI)."

[tasks.verify]
depends = ["test"]
description = "Full pre-push verification: build, format check, test."

# Define tasks for running specific CLI commands using dotnet run.

[tasks.profiles]
run = "dotnet run --project src/cli/Itr.Cli.fsproj -- profiles json"
description = "Run the profiles command using dotnet run."

[tasks.profile-add]
description = "Run the profiles add command using dotnet run."
usage = '''
arg "<name>" help="Name of the profile to add."
flag "--git-name <git-name>" help="Git user name to associate with the profile."
flag "--git-email <git-email>" help="Git email to associate with the profile."
flag "--default" help="Set the new profile as the default profile."
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail
EXTRA_ARGS=()
if [ "${usage_default:-false}" = "true" ]; then EXTRA_ARGS+=("--set-default"); fi
dotnet run --project src/cli/Itr.Cli.fsproj -- profiles add "${usage_name?}" --git-name "${usage_git_name?}" --git-email "${usage_git_email?}" "${EXTRA_ARGS[@]+"${EXTRA_ARGS[@]}"}"
'''

[tasks.product-init]
run = "dotnet run --project src/cli/Itr.Cli.fsproj -- product init"
description = "Run the product init command using dotnet run."

[tasks.product-register]
run = "dotnet run --project src/cli/Itr.Cli.fsproj -- product register ./itr/"
description = "Run the product register command using dotnet run."

[tasks.backlog-add]
description = "Run the backlog add command using dotnet run."
usage = '''
arg "<id>" help="ID of the backlog item to add."
flag "--title <title>" help="Title of the backlog item to add."
'''
run = '''#!/usr/bin/env bash
set -euo pipefail
dotnet run --project src/cli/Itr.Cli.fsproj -- backlog add "${usage_id?}" --title "${usage_title?}" 
'''

[tasks.backlog-take]
description = "Run the backlog take command using dotnet run."
usage = '''
arg "<item-id>" help="ID of the backlog item to take."
'''
run = '''#!/usr/bin/env bash
set -euo pipefail
dotnet run --project src/cli/Itr.Cli.fsproj -- backlog take "${usage_item_id?}"
'''

[tasks.backlog-list]
run = "dotnet run --project src/cli/Itr.Cli.fsproj -- backlog list"
description = "Run the backlog list command using dotnet run."

[tasks.backlog-info]
run = "dotnet run --project src/cli/Itr.Cli.fsproj -- backlog info"
description = "Run the backlog info command using dotnet run."

[tasks.task-list]
run = "dotnet run --project src/cli/Itr.Cli.fsproj -- task list"
description = "Run the task list command using dotnet run."

[tasks.task-info]
run = "dotnet run --project src/cli/Itr.Cli.fsproj -- task info"
description = "Run the task info command using dotnet run."

