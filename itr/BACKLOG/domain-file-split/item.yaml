id: domain-file-split
title: Split Domain.fs and Interfaces.fs into per-concept files
repos:
  - itr
type: refactor
priority: high
summary: >
  Domain.fs is a 343-line flat file and Interfaces.fs defines capability interfaces
  for all domain concepts in one place. Split both into per-concept files
  (Types, Validation, Portfolio, Product, Task, Backlog) aligned with the four
  categories in docs/terminology.md, co-locating each interface with its domain
  file. No logic changes — pure structural reorganisation that improves
  navigability, maintainability, and creates natural homes for state machine,
  validation, and capability boundary definitions.
acceptance_criteria:
  - Domain.fs is deleted and its content distributed across Effect.fs, Types.fs, Validation.fs, Portfolio.fs, Product.fs, Task.fs, and Backlog.fs
  - Interfaces.fs is deleted and its interfaces co-located with their domain files: IFileSystem/IEnvironment/IYamlService/IGitService/IAgentHarness/IoError in Types.fs; IPortfolioConfig/IProductConfig in Portfolio.fs; ITaskStore in Task.fs; IBacklogStore/IViewStore in Backlog.fs
  - Compile order in Itr.Domain.fsproj reflects the new file dependency graph with no Domain.fs or Interfaces.fs entries
  - TaskError is extracted from BacklogError and contains TaskNotFound, InvalidTaskState, MissingPlanArtifact, TaskIdConflict, TaskIdOverrideRequiresSingleRepo
  - ITaskStore methods use TaskError instead of BacklogError
  - Feature usecases that return BacklogError for task-related failures are updated to TaskError
  - All existing tests pass with no behaviour changes
dependencies:
created_at: 2026-04-20
