id: task-split

title: Split a task into smaller tasks

type: feature

priority: medium

repos:
  - itr

summary: >
  Allow users to explicitly split an existing task into two or more smaller tasks
  when the original scope proves too large. Splitting is only permitted before
  a task has been approved, keeping planning flexible while protecting committed work.

acceptance_criteria:
  - A command splits an existing task into multiple new tasks
  - Each new task has its own task id, inherits the source backlog reference, and is scoped to a repo
  - Splitting is only permitted when the task is in planning or planned state
  - The original task is removed and replaced by the new tasks
  - Validation rejects duplicate task ids within the split operation

dependencies:
  - backlog-take

created_at: 2026-03-10
