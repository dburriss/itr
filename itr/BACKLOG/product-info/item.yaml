type: feature
priority: medium
summary: |-
  Adds a product info command that takes in a product id, or if no id and in a directory or subdirectory of an existing product will show the info for that product. Shows id, description(new), docs, repos, and the coordination type and details
acceptance_criteria:
- Prints in table format by default
- Can print as json
