id: profile-add

title: Add a profile to itr settings

type: feature

priority: high

repos:
  - itr

summary: >
  Allow users to add a named profile with repo root and optional git identity
  into itr.json.

acceptance_criteria:
  - A command adds a new profile to itr.json
  - Profile captures repo_root and optional git user/email
  - Duplicate profile names are rejected clearly
  - Added profile is available to later product registration and selection flows

dependencies:
  - settings-bootstrap

created_at: 2026-03-10
