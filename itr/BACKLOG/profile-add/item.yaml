id: profile-add

title: Add a profile to itr settings

type: feature

priority: high

repos:
  - itr

summary: >
  Allow users to add a named profile with an optional git identity into
  itr.json and then register products under that profile.

acceptance_criteria:
  - A command adds a new profile to itr.json
  - Profile captures optional gitIdentity name and email
  - Products added under the profile are tracked by product root directory path
  - Duplicate profile names are rejected clearly
  - Added profile is available to later product registration and selection flows

dependencies:
  - settings-bootstrap

created_at: 2026-03-10
