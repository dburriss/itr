id: task-list-filters
title: When showing list of tasks I expect to see archived ones too
repos:
- itr
type: bug
priority: medium
summary: |
  We need a better way to filter tasks in the task-list command.
  The task-list command currently filters out archived tasks by default.
  Users expect archived tasks to appear alongside active ones. 
  An --exclude archived flag will be added to opt out of showing them. 
acceptance_criteria:
- Running `task-list` shows all tasks, including archived ones
- Running `task-list --exclude <status>` shows all tasks, excluding ones in state xyz where xyz is any valid state
- Running `task-list --state <status>` shows only tasks in state xyz, including archived ones if they are in that state
- When using --order-by created, items should be ordered by creation date regardless of type or priority.
- When using --order-by state, items should be ordered by priority regardless of type or creation date.
dependencies:
- task-list
- backlog-add
created_at: 2026-03-30
