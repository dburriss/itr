id: task-info

title: Show detailed status for a task

type: feature

priority: high

repos:
  - itr

summary: >
  Provide a detailed task status view so users can inspect one task's plan,
  lifecycle state, and relationship to other tasks derived from the same backlog item.

acceptance_criteria:
  - A command shows a single task with its source backlog item, repo, state, and timestamps
  - The output includes whether a plan exists and whether that plan is approved
  - The output includes sibling tasks that reference the same backlog item
  - Output supports human-readable and structured modes

dependencies:
  - backlog-take

created_at: 2026-03-10
