id: backlog-info
title: Show details of a backlog item
repos:
- itr
type: feature
priority: 
summary: >
  As a user, I want to view the details of a backlog item so that I can understand its description, status, and related information.
acceptance_criteria: 
- Given a backlog item, when I view its details, then I should see its title, summary, status, type, priority, creation data, and id.
- I should see what views it is part of
- I should see what items it depends on and what items depend on it.
dependencies:
- backlog-item-create 
created_at: 2026-03-24
