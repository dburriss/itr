id: profile-set-default
title: Set a profile as default
repos:
- itr
type: feature
priority: medium
summary: |-
  Set the given profile as the default. Flags control whether local or global config is updated.
acceptance_criteria:
- If no flags it will set wherever the profile is coming from (local itr.json > global itr.json)
- If --local, defaultProfile in a local itr.json (creates if does not exist)
- If --global, defaultProfile in global itr.json
dependencies: 
created_at: 2026-04-04
