id: backlog-view-list

title: List backlog views for a product

type: feature

priority: medium

repos:
  - itr

summary: >
  Allow users to list all named backlog views defined for a product, giving a
  quick overview of the views available for delivery planning.

acceptance_criteria:
  - A command lists all view YAML files for the current product
  - Each entry shows the view id and description
  - Output supports table, json, and text modes

dependencies:
  - backlog-view-create

created_at: 2026-03-25
