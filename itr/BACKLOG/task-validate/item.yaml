id: task-validate

title: Validate a completed task

type: feature

priority: high

repos:
  - itr

summary: >
  Allow users to explicitly validate a task once implementation is complete so
  there is a clear acceptance gate before archiving.

acceptance_criteria:
  - A command transitions a task from implemented to validated
  - Validation checks must pass before the transition is allowed
  - Validation failures return clear structured errors describing what is incomplete
  - Validated status is visible in task list and task detail output

dependencies:
  - task-done

created_at: 2026-03-10
