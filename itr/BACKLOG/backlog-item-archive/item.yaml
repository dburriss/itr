id: backlog-item-archive

title: Archive a completed backlog item

type: feature

priority: medium

repos:
  - itr

summary: >
  Allow users to archive a completed backlog item by moving it to the _archive/
  directory with a date prefix, keeping the active backlog clean.

acceptance_criteria:
  - A command moves a backlog item directory to _archive/ with a date prefix (YYYY-MM-DD-<id>)
  - Archiving is rejected if the item has active (non-archived) tasks referencing it
  - Archiving a non-existent item id returns a clear error
  - Output confirms the item id and destination path on success

dependencies:
  - backlog-item-create
  - task-archive

created_at: 2026-03-25
