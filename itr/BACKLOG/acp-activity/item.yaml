id: acp-activity
title: Show agent activity when doing an ACP call
repos:
- itr
type: feature
priority: medium
summary: |-
  When using an agent over ACP, info is sent back but discarded. If --debug or --vebose is provided, the extra info should be printed. If verbose is used, then the info will appear on a single like using Spectre.Console Status Display. If using --debug, just print each message.
acceptance_criteria:
- If verbose added then status updates are returned
- If debug flag then status updates are printed
- If both flags then it is like only --debug is passed
- 'The following info is printed: agent_thought_chunk, tool_call, tool_call_update'
- usage_update is printed with debug only at the end
- usage_update is updated at the end of the display status with verbose
- If --print, or --debug is passed in then only is agent_message_chunk is printed
dependencies:
- backlog-add-ai
- plan-acp
created_at: 2026-03-31
