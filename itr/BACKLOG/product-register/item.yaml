id: product-register

title: Register an existing product in itr settings

type: feature

priority: high

repos:
  - itr

summary: >
  Add an existing product root directory to itr.json so itr can locate and
  manage it under a selected profile.

acceptance_criteria:
  - A command registers an existing product root directory in itr.json
  - Registration can target the active profile or an explicitly chosen profile
  - The product id is read from product.yaml and duplicates are rejected
  - Registration does not require creating product files beyond an existing product root on disk

dependencies:
  - settings-bootstrap
  - profile-add
  - profile-selection

created_at: 2026-03-10
