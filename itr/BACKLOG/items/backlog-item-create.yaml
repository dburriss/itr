id: backlog-item-create

title: Create backlog items for a product

type: feature

priority: medium

repos:
  - itr

summary: >
  Allow users to create backlog item files in the product coordination root using
  the documented schema.

acceptance_criteria:
  - A command creates a backlog item YAML file with required fields
  - Item ids are validated and duplicate ids are rejected
  - Repo references are validated against product.yaml
  - created_at is populated automatically

dependencies:
  - product-init

created_at: 2026-03-10
