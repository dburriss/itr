id: task-split

title: Split a backlog item into multiple tasks

type: feature

priority: medium

repos:
  - itr

summary: >
  Allow users to break a backlog item into multiple executable tasks so broad
  cross-repo work can be planned and delivered as smaller independent slices.
  Each task produced by a split is scoped to exactly one repo.

acceptance_criteria:
  - A command creates multiple tasks from a single backlog item in one workflow
  - Each created task has its own task id, repo assignment, and source backlog reference
  - The split flow supports creating one task per repo for multi-repo backlog items
  - Validation rejects duplicate task ids within the requested split operation

dependencies:
  - task-promotion

created_at: 2026-03-10
