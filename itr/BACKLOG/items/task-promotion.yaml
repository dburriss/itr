id: task-promotion

title: Promote backlog items into tasks

type: feature

priority: high

repos:
  - itr

summary: >
  Allow users to promote a backlog item into a task so simple one-to-one work can
  start immediately while still supporting multiple tasks derived from the same
  backlog item over time. Each task is scoped to exactly one repo.

acceptance_criteria:
  - A command creates a task coordination directory and task.yaml from a backlog item
  - A promoted task records its source backlog item, a unique task id, and a single repo
  - A backlog item can be promoted more than once to create multiple tasks
  - If a backlog item maps to a single repo with no existing tasks the backlog id can be used as the default task id
  - Promotion validates that the selected repo exists in product.yaml

dependencies:
  - product-init
  - backlog-item-create

created_at: 2026-03-10
