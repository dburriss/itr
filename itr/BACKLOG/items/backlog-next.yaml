id: backlog-next

title: Pull the next unfinished backlog item from a view

type: feature

priority: high

repos:
  - itr

summary: >
  Provide a command that pulls the next unfinished backlog item from a backlog view
  so teams can work through a delivery queue in order.

acceptance_criteria:
  - A command selects the next item from a specified backlog view where not all linked features are archived
  - Items with no linked features are not considered done and are eligible for selection
  - Items where all linked features are archived are skipped
  - Output supports human-readable and structured modes
  - A verbose flag enables explanation of why the item was chosen and why others were skipped

dependencies: []

created_at: 2026-03-10
