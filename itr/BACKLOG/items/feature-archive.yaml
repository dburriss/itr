id: feature-archive

title: Archive completed features

type: feature

priority: high

repos:
  - itr

summary: >
  Allow users to archive completed features so active work stays focused while the
  execution history remains available for traceability.

acceptance_criteria:
  - A command moves a done feature from FEATURES/active to FEATURES/archive
  - Archiving is rejected when a feature is not yet done
  - Archived feature metadata remains readable after the move
  - Archive operations preserve the feature's source backlog traceability

dependencies:
  - feature-done

created_at: 2026-03-10
