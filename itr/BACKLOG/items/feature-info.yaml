id: feature-info

title: Show detailed status for a feature

type: feature

priority: high

repos:
  - itr

summary: >
  Provide a detailed feature status view so users can inspect one feature's plan,
  lifecycle, repo progress, and relationship to other features derived from the same
  backlog item.

acceptance_criteria:
  - A command shows a single feature with its source backlog item, repo, state, and timestamps
  - The output includes whether a plan exists and whether that plan is approved
  - The output includes sibling features that reference the same backlog item
  - Output supports human-readable and structured modes

dependencies:
  - feature-promotion

created_at: 2026-03-10
