id: feature-done

title: Mark a feature as done

type: feature

priority: high

repos:
  - itr

summary: >
  Allow users to mark a feature as done when its implementation is complete and all
  completion rules are satisfied.

acceptance_criteria:
  - A command transitions a feature from in-progress to done
  - A feature cannot be marked done unless completion checks pass
  - Completion failures return clear structured errors describing what is still incomplete
  - Done status is visible in feature list and feature detail output

dependencies:
  - feature-start

created_at: 2026-03-10
