id: task-list

title: List tasks with lifecycle status

type: feature

priority: high

repos:
  - itr

summary: >
  Provide a listing command for tasks so users can see active execution work,
  lifecycle state, and planning readiness across a product.

acceptance_criteria:
  - A command lists all active tasks for a product
  - Output includes task id, source backlog item, repo, state, and plan approval status
  - Output supports human-readable and structured modes
  - The list can be filtered by backlog item, repo, or lifecycle state

dependencies:
  - task-promotion

created_at: 2026-03-10
