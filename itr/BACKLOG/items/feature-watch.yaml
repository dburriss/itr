id: feature-watch

title: Watch a feature for completion

type: feature

priority: medium

repos:
  - itr

summary: >
  Allow users to watch a feature's status until it reaches a target lifecycle state
  so they can monitor completion without repeatedly polling feature detail commands.

acceptance_criteria:
  - A watch mode refreshes feature status until the feature reaches a target state or is interrupted
  - Watch output surfaces plan readiness, approval status, and lifecycle state changes
  - Users can watch for completion of a specific feature without modifying feature data
  - Watch mode can be exposed through feature info or a dedicated command

dependencies:
  - feature-info
  - feature-done

created_at: 2026-03-10
