id: feature-split

title: Split a backlog item into multiple features

type: feature

priority: medium

repos:
  - itr

summary: >
  Allow users to break a backlog item into multiple executable features so broad
  cross-repo work can be planned and delivered as smaller feature slices.

acceptance_criteria:
  - A command creates multiple features from a single backlog item in one workflow
  - Each created feature has its own feature id, repo assignment, and source backlog reference
  - The split flow supports creating one feature per repo for multi-repo backlog items
  - Validation rejects duplicate feature ids within the requested split operation

dependencies:
  - feature-promotion

created_at: 2026-03-10
