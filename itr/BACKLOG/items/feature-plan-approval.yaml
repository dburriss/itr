id: feature-plan-approval

title: Approve a feature plan

type: feature

priority: high

repos:
  - itr

summary: >
  Allow users to explicitly approve a feature plan so planning has a clear handoff
  before implementation begins.

acceptance_criteria:
  - A command marks an existing feature plan as approved
  - Approval metadata is recorded in feature coordination data
  - Approval is rejected when a feature does not yet have a plan artifact
  - Approved status is visible in feature list and feature detail output

dependencies:
  - feature-plan

created_at: 2026-03-10
