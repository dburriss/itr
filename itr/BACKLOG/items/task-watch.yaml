id: task-watch

title: Watch a task for completion

type: feature

priority: medium

repos:
  - itr

summary: >
  Allow users to watch a task's status until it reaches a target lifecycle state
  so they can monitor completion without repeatedly polling task detail commands.

acceptance_criteria:
  - A watch mode refreshes task status until the task reaches a target state or is interrupted
  - Watch output surfaces plan readiness, approval status, and lifecycle state changes
  - Users can watch for completion of a specific task without modifying task data
  - Watch mode can be exposed through task info or a dedicated command

dependencies:
  - task-info
  - task-done

created_at: 2026-03-10
